name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update formula
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          SHA="${{ github.event.client_payload.sha256 }}"
          URL="https://github.com/gedalyahreback/screenshot-renamer/archive/refs/tags/${TAG}.tar.gz"

          sed -i "s|url ".*"|url "${URL}"|" Formula/screenshot-renamer.rb
          sed -i "s|sha256 ".*"|sha256 "${SHA}"|" Formula/screenshot-renamer.rb

      - name: Commit and push
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/screenshot-renamer.rb
          git commit -m "Update screenshot-renamer to ${TAG}"
          git push
